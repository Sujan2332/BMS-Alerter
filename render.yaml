services:
  - type: web
    name: bms-alerter
    runtime: node
    buildCommand: apt-get install -y chromium && npm install
    startCommand: node index.js
    envVars:
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium